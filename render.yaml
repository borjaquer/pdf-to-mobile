# ============================================
# PDF-to-Mobile — Render Static Site Config
# ============================================

services:
  - type: web
    name: pdf-to-mobile
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: VITE_OPENROUTER_API_KEY
        sync: false
      - key: VITE_FIRECRAWL_API_KEY
        sync: false
